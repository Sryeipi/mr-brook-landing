  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: #0B0B0D;
      color: #FFFFFF;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Buttons ── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #8A6A4B;
      color: #FFFFFF;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 14px 28px;
      border-radius: 100px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 8px rgba(138,106,75,0.3), 0 0 0 1px rgba(138,106,75,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      white-space: nowrap;
    }
    .btn-primary:hover {
      background: #9E7A58;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(138,106,75,0.4), 0 0 0 1px rgba(138,106,75,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: rgba(255,255,255,0.7);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      padding: 14px 28px;
      border-radius: 100px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn-ghost:hover {
      border-color: rgba(200,176,138,0.5);
      color: #C8B08A;
      background: rgba(200,176,138,0.05);
    }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Hero elements animate on load */
    .hero-loaded .fade-up {
      animation: fadeInUp 0.8s ease-out forwards;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes imgFadeIn {
      from { opacity: 0; transform: scale(1.03); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Marquee ── */
    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .marquee-track {
      display: flex;
      width: max-content;
      animation: marquee 35s linear infinite;
    }

    .marquee-track:hover {
      animation-play-state: paused;
    }

    /* ── Scrollbar hide ── */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .hide-mobile { display: none !important; }

      .marquee-track { animation-duration: 18s; }

      /* Stack services grid */
      .services-grid { grid-template-columns: 1fr !important; }
      .transform-grid { grid-template-columns: 1fr !important; }
      .footer-grid { grid-template-columns: 1fr 1fr !important; }
    }

    @media (max-width: 480px) {
      .footer-grid { grid-template-columns: 1fr !important; }
    }

    /* ── prefers-reduced-motion ── */
    @media (prefers-reduced-motion: reduce) {
      .marquee-track { animation: none; }
      .fade-up, .hero-loaded .fade-up { animation: none; opacity: 1; transform: none; transition: none; }
    }
  </style>
</head>

<body>

<div id="root"></div>

<!-- Component scripts (loaded as Babel JSX) -->
<script type="text/babel" src="components/hero.jsx"></script>
<script type="text/babel" src="components/marquee-locations.jsx"></script>

<script type="text/babel" src="components/bottom-sections.jsx"></script>

<script type="text/babel">

      const hero = document.querySelector('#hero');
      if (hero) {

      }
    }, []);

    return (
      <React.Fragment>

            </svg>
          </a>
        </div>
      </React.Fragment>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>
